<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Human Body Lab | Neural Atlas</title>
  <!-- Fonts & Icons -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    /* ========== FUTURISTIC CORE STYLES ========== */
    :root {
      --bg-dark: #05070a;
      --bg-panel: #0a0f1a;
      --primary-cyan: #00f0ff;
      --primary-blue: #3f7ce5;
      --accent-pink: #ff007f;
      --accent-purple: #9d4edd;
      --text-primary: #ffffff;
      --text-secondary: #a0b3d9;
      --glass-border: rgba(0, 240, 255, 0.15);
      --glow: 0 0 20px rgba(0, 240, 255, 0.3);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg-dark);
      color: var(--text-primary);
      line-height: 1.5;
      overflow-x: hidden;
    }

    /* Animated Background */
    #neural-bg {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      z-index: -1; background: radial-gradient(circle at 20% 30%, #10182f, #05070a);
    }

    /* Glassmorphism Panel */
    .glass-panel {
      background: rgba(10, 15, 26, 0.7);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--glass-border);
      border-radius: 24px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
      padding: 24px;
      transition: all 0.3s ease;
    }
    .glass-panel:hover { border-color: rgba(0, 240, 255, 0.4); box-shadow: var(--glow); }

    /* Layout */
    .container { max-width: 1440px; margin: 0 auto; padding: 20px; }
    .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
    .logo h1 { font-size: 2.5rem; font-weight: 700; background: linear-gradient(135deg, #fff, var(--primary-cyan)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .logo span { font-size: 1rem; color: var(--text-secondary); display: block; }
    .stats { display: flex; gap: 30px; }
    .stat-item { text-align: center; }
    .stat-value { font-size: 2rem; font-weight: 700; color: var(--primary-cyan); }
    .stat-label { font-size: 0.9rem; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 1px; }

    /* System Grid */
    .systems-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 24px;
      margin-top: 30px;
    }

    .system-card {
      background: rgba(10, 15, 26, 0.6);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid var(--glass-border);
      border-radius: 20px;
      padding: 20px;
      cursor: pointer;
      transition: all 0.25s ease;
      position: relative;
      overflow: hidden;
    }
    .system-card:hover {
      transform: translateY(-5px);
      border-color: var(--primary-cyan);
      box-shadow: var(--glow);
      background: rgba(20, 30, 50, 0.8);
    }
    .system-card::before {
      content: ''; position: absolute; top: 0; left: 0; width: 4px; height: 100%;
      background: linear-gradient(to bottom, var(--primary-cyan), var(--accent-purple));
    }
    .card-header { display: flex; align-items: center; gap: 15px; margin-bottom: 15px; }
    .card-icon { font-size: 2.5rem; color: var(--primary-cyan); filter: drop-shadow(0 0 10px rgba(0, 240, 255, 0.5)); }
    .card-title { font-size: 1.5rem; font-weight: 600; }
    .card-subtitle { font-size: 0.9rem; color: var(--text-secondary); }
    .card-stats { display: flex; gap: 15px; margin: 15px 0; }
    .organ-preview { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 15px; }
    .organ-tag { background: rgba(0, 240, 255, 0.1); border: 1px solid rgba(0, 240, 255, 0.2); border-radius: 20px; padding: 5px 12px; font-size: 0.8rem; color: var(--primary-cyan); }
    .progress-bar { height: 6px; background: rgba(255,255,255,0.1); border-radius: 3px; margin: 15px 0; overflow: hidden; }
    .progress-fill { height: 100%; width: 60%; background: linear-gradient(90deg, var(--primary-cyan), var(--accent-purple)); border-radius: 3px; }

    /* Search Bar */
    .search-container { margin: 20px 0; }
    .search-box {
      width: 100%; padding: 16px 24px;
      background: rgba(10, 15, 26, 0.8); backdrop-filter: blur(8px);
      border: 1px solid var(--glass-border); border-radius: 40px;
      color: white; font-size: 1rem;
    }
    .search-box::placeholder { color: var(--text-secondary); }
    .search-box:focus { outline: none; border-color: var(--primary-cyan); box-shadow: var(--glow); }

    /* Responsive */
    @media (max-width: 768px) {
      .header { flex-direction: column; align-items: start; gap: 15px; }
      .logo h1 { font-size: 2rem; }
    }

    /* Loading animation */
    .loading { text-align: center; padding: 50px; color: var(--primary-cyan); }
    .hidden { display: none; }
  </style>
</head>
<body>
  <canvas id="neural-bg"></canvas>

  <div class="container">
    <!-- Header -->
    <div class="header glass-panel">
      <div class="logo">
        <h1>HUMAN BODY LAB</h1>
        <span>Neural Atlas // Interactive 3D Physiology</span>
      </div>
      <div class="stats">
        <div class="stat-item">
          <div class="stat-value" id="total-systems">11</div>
          <div class="stat-label">Systems</div>
        </div>
        <div class="stat-item">
          <div class="stat-value" id="total-organs">78</div>
          <div class="stat-label">Organs</div>
        </div>
        <div class="stat-item">
          <div class="stat-value" id="xp-score">0</div>
          <div class="stat-label">Lab XP</div>
        </div>
      </div>
    </div>

    <!-- Search & Filter -->
    <div class="search-container">
      <input type="text" class="search-box" placeholder="Search systems, organs, or nerves..." id="search-input">
    </div>

    <!-- Systems Grid (loaded dynamically) -->
    <div id="systems-container" class="systems-grid">
      <div class="loading"><i class="fas fa-circle-notch fa-spin"></i> Loading Atlas...</div>
    </div>
  </div>

  <script>
    (function() {
      // Neural Background Animation
      const canvas = document.getElementById('neural-bg');
      const ctx = canvas.getContext('2d');
      let width, height;
      let particles = [];
      
      function resizeCanvas() {
        width = window.innerWidth;
        height = window.innerHeight;
        canvas.width = width;
        canvas.height = height;
      }
      
      function initParticles(count = 80) {
        particles = [];
        for (let i = 0; i < count; i++) {
          particles.push({
            x: Math.random() * width,
            y: Math.random() * height,
            vx: (Math.random() - 0.5) * 0.2,
            vy: (Math.random() - 0.5) * 0.2,
            size: Math.random() * 2 + 1
          });
        }
      }
      
      function drawParticles() {
        ctx.clearRect(0, 0, width, height);
        ctx.fillStyle = '#00f0ff';
        ctx.shadowColor = '#00f0ff';
        ctx.shadowBlur = 8;
        
        particles.forEach(p => {
          p.x += p.vx;
          p.y += p.vy;
          
          if (p.x < 0 || p.x > width) p.vx *= -1;
          if (p.y < 0 || p.y > height) p.vy *= -1;
          
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
          ctx.fill();
        });
        
        // Draw connections
        ctx.shadowBlur = 4;
        ctx.strokeStyle = 'rgba(0, 240, 255, 0.08)';
        ctx.lineWidth = 0.5;
        for (let i = 0; i < particles.length; i++) {
          for (let j = i + 1; j < particles.length; j++) {
            const dx = particles[i].x - particles[j].x;
            const dy = particles[i].y - particles[j].y;
            const dist = Math.sqrt(dx*dx + dy*dy);
            if (dist < 100) {
              ctx.beginPath();
              ctx.moveTo(particles[i].x, particles[i].y);
              ctx.lineTo(particles[j].x, particles[j].y);
              ctx.stroke();
            }
          }
        }
        requestAnimationFrame(drawParticles);
      }
      
      window.addEventListener('resize', () => {
        resizeCanvas();
        initParticles();
      });
      
      resizeCanvas();
      initParticles();
      drawParticles();

      // Data loading and rendering
      const container = document.getElementById('systems-container');
      const searchInput = document.getElementById('search-input');
      let systemsData = [];
      
      async function loadData() {
        try {
          const response = await fetch('data.json');
          systemsData = await response.json();
          renderSystems(systemsData);
          updateStats(systemsData);
        } catch (error) {
          console.error('Error loading data:', error);
          container.innerHTML = '<p style="color:red;">Failed to load atlas data. Ensure data.json exists.</p>';
        }
      }
      
      function updateStats(data) {
        document.getElementById('total-systems').textContent = data.length;
        const totalOrgans = data.reduce((sum, sys) => sum + (sys.organs ? sys.organs.length : 0), 0);
        document.getElementById('total-organs').textContent = totalOrgans;
        const xp = localStorage.getItem('labScore') || 0;
        document.getElementById('xp-score').textContent = xp;
      }
      
      function renderSystems(systems) {
        if (!systems.length) {
          container.innerHTML = '<p>No systems found.</p>';
          return;
        }
        
        let html = '';
        systems.forEach(system => {
          const organs = system.organs || [];
          const organTags = organs.slice(0, 4).map(o => `<span class="organ-tag">${o.name}</span>`).join('');
          const moreCount = organs.length > 4 ? ` +${organs.length - 4}` : '';
          
          html += `
            <div class="system-card" data-system-id="${system.id}" onclick="window.location.href='${system.pageUrl}'">
              <div class="card-header">
                <div class="card-icon"><i class="fas ${system.icon}"></i></div>
                <div>
                  <div class="card-title">${system.name}</div>
                  <div class="card-subtitle">${system.organs ? system.organs.length : 0} major components</div>
                </div>
              </div>
              <p style="color: var(--text-secondary); margin-bottom: 15px;">${system.shortDesc}</p>
              <div class="progress-bar">
                <div class="progress-fill" style="width: ${system.completion || 0}%"></div>
              </div>
              <div class="organ-preview">
                ${organTags} ${moreCount ? `<span class="organ-tag">${moreCount}</span>` : ''}
              </div>
              <div style="display: flex; justify-content: space-between; margin-top: 20px;">
                <span style="color: var(--primary-cyan);"><i class="fas fa-microchip"></i> ${system.status}</span>
                <span style="color: var(--accent-purple);">+${system.xp} XP <i class="fas fa-arrow-right"></i></span>
              </div>
            </div>
          `;
        });
        container.innerHTML = html;
      }
      
      // Search functionality
      searchInput.addEventListener('input', (e) => {
        const term = e.target.value.toLowerCase();
        const filtered = systemsData.filter(sys => 
          sys.name.toLowerCase().includes(term) ||
          (sys.organs && sys.organs.some(o => o.name.toLowerCase().includes(term)))
        );
        renderSystems(filtered);
      });
      
      // Load XP from localStorage
      function initXP() {
        if (!localStorage.getItem('labScore')) {
          localStorage.setItem('labScore', '0');
        }
        document.getElementById('xp-score').textContent = localStorage.getItem('labScore');
      }
      
      initXP();
      loadData();
    })();
  </script>
</body>
</html>
