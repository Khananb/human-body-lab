<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Human Body Lab</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: #0a0a0f;
  color: #fff;
}

header {
  padding: 20px;
  text-align: center;
  font-size: 28px;
  font-weight: bold;
  background: linear-gradient(135deg, #7c6aff, #a855f7);
}

.container {
  padding: 30px 20px;
  max-width: 1100px;
  margin: auto;
}

h2 {
  text-align: center;
  margin-bottom: 30px;
  color: #ccc;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 20px;
}

.card {
  background: #151520;
  border: 1px solid rgba(255,255,255,0.05);
  padding: 25px;
  border-radius: 16px;
  text-align: center;
  transition: 0.3s;
  cursor: pointer;
}

.card:hover {
  transform: translateY(-6px);
  background: #1e1e2e;
}

.card h3 {
  margin: 10px 0;
}

.card p {
  font-size: 14px;
  color: #aaa;
}

a {
  text-decoration: none;
  color: inherit;
}

.score-box {
  text-align: center;
  margin-top: 30px;
  font-size: 18px;
  color: #7c6aff;
}
</style>
</head>

<body>

<header>🧠 Human Body Lab</header>

<div class="container">

<h2>Explore Human Body Systems</h2>

<div class="grid">

<a href="heart.html">
<div class="card">
  <h3>❤️ Heart</h3>
  <p>Learn how blood flows and keeps you alive</p>
</div>
</a>

<a href="brain.html">
<div class="card">
  <h3>🧠 Brain</h3>
  <p>Understand thinking, memory & control</p>
</div>
</a>

<a href="lungs.html">
<div class="card">
  <h3>🫁 Lungs</h3>
  <p>Discover breathing & oxygen system</p>
</div>
</a>

</div>

<div class="score-box">
🏆 Your Score: <span id="score">0</span>
</div>

</div>

<script>
let score = localStorage.getItem("score") || 0;
document.getElementById("score").innerText = score;
</script>

</body>
</html>
